<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Pro - Editor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" style="max-width: 1400px;">
        <header style="margin-bottom: 1.5rem;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <a href="index.html" class="btn btn-secondary">← Back</a>
                <h1>Resume Editor</h1>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button onclick="saveCV()" class="btn btn-secondary">💾 Save Progress</button>
                <button onclick="downloadPDF()" class="btn btn-primary">📥 Download PDF</button>
            </div>
        </header>

        <div class="editor-container">
            <!-- Sidebar / Form -->
            <div class="editor-sidebar" id="editor-form">
                <div class="form-group">
                    <label>Resume Title</label>
                    <input type="text" id="cv-title" placeholder="e.g., Software Engineer 2024">
                </div>

                <div class="form-group">
                    <label>Visual Theme</label>
                    <select id="cv-template">
                        <option value="Classic">Classic</option>
                        <option value="Formal">Formal</option>
                        <option value="Colorful">Colorful</option>
                    </select>
                </div>

                <div class="section-header">
                    <h3>Personal Details</h3>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="cv-full-name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="cv-email">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="cv-phone">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="cv-address">
                </div>
                <div class="form-group">
                    <label>LinkedIn</label>
                    <input type="text" id="cv-linkedin">
                </div>
                <div class="form-group">
                    <label>Summary</label>
                    <textarea id="cv-summary" rows="4"></textarea>
                </div>

                <div class="section-header">
                    <h3>Experience</h3>
                    <button class="btn btn-secondary" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;" onclick="addExperience()">+ Add</button>
                </div>
                <div id="experience-list"></div>

                <div class="section-header">
                    <h3>Education</h3>
                    <button class="btn btn-secondary" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;" onclick="addEducation()">+ Add</button>
                </div>
                <div id="education-list"></div>

                <div class="section-header">
                    <h3>Skills</h3>
                </div>
                <div class="form-group">
                    <label>Technical Skills (comma separated)</label>
                    <textarea id="cv-skills" placeholder="Python, JavaScript, SQL..."></textarea>
                </div>
            </div>

            <!-- Preview Panel -->
            <div class="preview-panel">
                <iframe id="preview-frame"></iframe>
                <div style="position: absolute; top: 1rem; right: 1rem; background: rgba(0,0,0,0.5); color: white; padding: 0.25rem 0.75rem; border-radius: 100px; font-size: 0.75rem;">LIVE PREVIEW</div>
            </div>
        </div>
    </div>

    <script>
        let cvId = new URLSearchParams(window.location.search).get('id');
        let debouncer;

        function updatePreview() {
            clearTimeout(debouncer);
            debouncer = setTimeout(() => {
                const data = collectData();
                const frame = document.getElementById('preview-frame');
                // We'll use a local generation for preview to make it fast
                // For now, let's just trigger a save-and-preview or a preview-only endpoint
                fetchPreview(data);
            }, 500);
        }

        async function fetchPreview(data) {
            // Ideally, we'd have a preview endpoint that takes JSON and returns HTML
            // For now, we'll save and then reload the preview if there's an ID
            // Or better, let's assume the backend has a /api/preview endpoint
            const response = await fetch('/api/cvs/preview-temp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const html = await response.text();
            const doc = document.getElementById('preview-frame').contentWindow.document;
            doc.open();
            doc.write(html);
            doc.close();
        }

        function collectData() {
            const expEntries = Array.from(document.querySelectorAll('.experience-entry')).map(el => ({
                job_title: el.querySelector('.exp-title').value,
                company: el.querySelector('.exp-company').value,
                start_date: el.querySelector('.exp-start').value,
                end_date: el.querySelector('.exp-end').value,
                description: el.querySelector('.exp-desc').value
            }));

            const eduEntries = Array.from(document.querySelectorAll('.education-entry')).map(el => ({
                degree: el.querySelector('.edu-degree').value,
                institution: el.querySelector('.edu-inst').value,
                year: el.querySelector('.edu-year').value
            }));

            return {
                id: cvId,
                title: document.getElementById('cv-title').value,
                template: document.getElementById('cv-template').value,
                full_name: document.getElementById('cv-full-name').value,
                email: document.getElementById('cv-email').value,
                phone: document.getElementById('cv-phone').value,
                address: document.getElementById('cv-address').value,
                linkedin: document.getElementById('cv-linkedin').value,
                summary: document.getElementById('cv-summary').value,
                experience: expEntries,
                education: eduEntries,
                skills: document.getElementById('cv-skills').value.split(',').map(s => s.trim())
            };
        }

        async function saveCV() {
            const data = collectData();
            const response = await fetch('/api/cvs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (result.cv_id) {
                cvId = result.cv_id;
                // Update URL without refreshing
                const newUrl = window.location.pathname + '?id=' + cvId;
                window.history.pushState({path:newUrl},'',newUrl);
                alert('Saved successfully!');
            }
        }

        function downloadPDF() {
            if (!cvId) {
                alert('Please save your resume first!');
                return;
            }
            window.open(`/api/cvs/${cvId}/preview`, '_blank');
        }

        function addExperience(data = {}) {
            const container = document.getElementById('experience-list');
            const div = document.createElement('div');
            div.className = 'entry-card experience-entry';
            div.innerHTML = `
                <span class="remove-entry" onclick="this.parentElement.remove(); updatePreview();">×</span>
                <div class="form-group"><input type="text" class="exp-title" placeholder="Job Title" value="${data.job_title || ''}" oninput="updatePreview()"></div>
                <div class="form-group"><input type="text" class="exp-company" placeholder="Company" value="${data.company || ''}" oninput="updatePreview()"></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem">
                    <input type="text" class="exp-start" placeholder="Start Date" value="${data.start_date || ''}" oninput="updatePreview()">
                    <input type="text" class="exp-end" placeholder="End Date" value="${data.end_date || ''}" oninput="updatePreview()">
                </div>
                <textarea class="exp-desc" placeholder="Responsibilities..." style="margin-top: 0.5rem" oninput="updatePreview()">${data.description || ''}</textarea>
            `;
            container.appendChild(div);
        }

        function addEducation(data = {}) {
            const container = document.getElementById('education-list');
            const div = document.createElement('div');
            div.className = 'entry-card education-entry';
            div.innerHTML = `
                <span class="remove-entry" onclick="this.parentElement.remove(); updatePreview();">×</span>
                <div class="form-group"><input type="text" class="edu-degree" placeholder="Degree" value="${data.degree || ''}" oninput="updatePreview()"></div>
                <div class="form-group"><input type="text" class="edu-inst" placeholder="Institution" value="${data.institution || ''}" oninput="updatePreview()"></div>
                <input type="text" class="edu-year" placeholder="Year" value="${data.year || ''}" oninput="updatePreview()">
            `;
            container.appendChild(div);
        }

        async function loadCV() {
            if (!cvId) {
                addExperience();
                addEducation();
                return;
            }
            const response = await fetch(`/api/cvs/${cvId}`);
            const cv = await response.json();
            
            document.getElementById('cv-title').value = cv.title || '';
            document.getElementById('cv-template').value = cv.template || 'Classic';
            document.getElementById('cv-full-name').value = cv.full_name || '';
            document.getElementById('cv-email').value = cv.email || '';
            document.getElementById('cv-phone').value = cv.phone || '';
            document.getElementById('cv-address').value = cv.address || '';
            document.getElementById('cv-linkedin').value = cv.linkedin || '';
            document.getElementById('cv-summary').value = cv.summary || '';
            document.getElementById('cv-skills').value = (cv.skills || []).join(', ');

            cv.experience.forEach(exp => addExperience(exp));
            cv.education.forEach(edu => addEducation(edu));
            
            updatePreview();
        }

        window.onload = loadCV;

        // Add event listeners to all main inputs
        document.querySelectorAll('#editor-form input, #editor-form textarea, #editor-form select').forEach(el => {
            el.addEventListener('input', updatePreview);
        });
    </script>
</body>
</html>
