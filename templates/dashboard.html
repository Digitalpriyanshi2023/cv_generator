<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Resume Pro Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
        }

        .navbar {
            background: white;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
            text-decoration: none;
        }

        .container {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            border: none;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .cv-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .cv-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .cv-card:hover {
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
        }

        .cv-info h3 {
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
        }

        .cv-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .cv-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: #f1f5f9;
        }

        .btn-danger {
            background: #fee2e2;
            color: #ef4444;
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        .empty-state {
            text-align: center;
            padding: 5rem 0;
            color: var(--text-muted);
        }

        @media (max-width: 640px) {
            .cv-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 1.5rem;
            }
            .cv-actions {
                width: 100%;
            }
            .cv-actions .btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">RESUME PRO</a>
        <div>
            <a href="/editor" class="btn btn-primary">+ Create New</a>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <div>
                <h1>Your Resumes</h1>
                <p style="color: var(--text-muted)">Manage your professional profiles</p>
            </div>
        </div>

        <div class="cv-grid">
            {% if cvs %}
                {% for cv in cvs %}
                <div class="cv-card" id="cv-{{ cv.id }}">
                    <div class="cv-info">
                        <h3>{{ cv.title }}</h3>
                        <p>👤 {{ cv.full_name or 'Unnamed' }} • Professional Resume</p>
                    </div>
                    <div class="cv-actions">
                        <a href="/editor/{{ cv.id }}" class="btn btn-outline">✎ Edit</a>
                        <a href="/preview/{{ cv.id }}" class="btn btn-primary" target="_blank">📥 Preview</a>
                        <button onclick="deleteCv({{ cv.id }})" class="btn btn-danger">🗑</button>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <div class="empty-state">
                    <p>No resumes yet. Start by creating your first elite CV!</p>
                </div>
            {% endif %}
        </div>
    </div>

    <script>
        async function deleteCv(id) {
            if (confirm('Are you sure you want to delete this resume?')) {
                const response = await fetch(`/delete/${id}`, { method: 'POST' });
                if (response.ok) {
                    document.getElementById(`cv-${id}`).remove();
                }
            }
        }
    </script>
</body>
</html>
