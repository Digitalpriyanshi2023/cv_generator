<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor - Resume Pro Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f1f5f9;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); }

        .navbar {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 400px; gap: 2rem; }
        
        .editor-panel { background: var(--card); border-radius: 24px; padding: 2rem; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .preview-panel { background: #cbd5e1; border-radius: 24px; padding: 1rem; border: 1px solid var(--border); position: sticky; top: 5rem; height: calc(100vh - 7rem); display: flex; flex-direction: column; }
        
        iframe { flex: 1; border: none; border-radius: 16px; background: white; }

        h2 { margin-bottom: 1.5rem; font-size: 1.5rem; font-weight: 800; }
        .section { margin-bottom: 2.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        input, select, textarea {
            width: 100%; padding: 0.75rem 1rem; border-radius: 12px; border: 1px solid var(--border);
            font-family: inherit; font-size: 1rem; transition: all 0.2s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        
        .entry-card { background: #f8fafc; padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 1rem; position: relative; }
        .btn-remove { position: absolute; top: 1rem; right: 1rem; background: #fee2e2; color: #ef4444; border: none; padding: 0.5rem; border-radius: 8px; cursor: pointer; }

        .btn { padding: 0.75rem 1.5rem; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #f1f5f9; color: var(--text); }
        
        .actions { display: flex; gap: 1rem; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border); }

        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; }
            .preview-panel { display: none; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" style="text-decoration: none; font-weight: 800; color: var(--primary);">← DASHBOARD</a>
        <div style="display: flex; gap: 1rem;">
            <button onclick="saveCv()" class="btn btn-primary">Save Resume</button>
        </div>
    </nav>

    <div class="container">
        <div class="editor-panel">
            <form id="cvForm">
                <input type="hidden" id="cvId" value="{{ cv_id or '' }}">
                
                <div class="section">
                    <h2>General Settings</h2>
                    <div class="form-group">
                        <label>Resume Title</label>
                        <input type="text" id="title" value="{{ cv.title or 'Untitled Resume' }}">
                    </div>
                    <div class="form-group">
                        <label>Visual Template</label>
                        <select id="template">
                            <option value="Classic" {% if cv.template == 'Classic' %}selected{% endif %}>Classic</option>
                            <option value="Formal" {% if cv.template == 'Formal' %}selected{% endif %}>Formal</option>
                            <option value="Colorful" {% if cv.template == 'Colorful' %}selected{% endif %}>Colorful</option>
                        </select>
                    </div>
                </div>

                <div class="section">
                    <h2>Personal Information</h2>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" value="{{ cv.full_name or '' }}">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" value="{{ cv.email or '' }}">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" id="phone" value="{{ cv.phone or '' }}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Summary</label>
                        <textarea id="summary" rows="4">{{ cv.summary or '' }}</textarea>
                    </div>
                </div>

                <div class="section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h2>Experience</h2>
                        <button type="button" onclick="addExperience()" class="btn btn-secondary">+ Add</button>
                    </div>
                    <div id="experienceList">
                        {% for exp in cv.experience or [] %}
                        <div class="entry-card experience-entry">
                            <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>
                            <div class="form-group"><label>Job Title</label><input type="text" class="exp-title" value="{{ exp.job_title }}"></div>
                            <div class="form-group"><label>Company</label><input type="text" class="exp-company" value="{{ exp.company }}"></div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group"><label>Start Date</label><input type="text" class="exp-start" value="{{ exp.start_date }}"></div>
                                <div class="form-group"><label>End Date</label><input type="text" class="exp-end" value="{{ exp.end_date }}"></div>
                            </div>
                            <div class="form-group"><label>Description</label><textarea class="exp-desc" rows="3">{{ exp.description }}</textarea></div>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <div class="section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h2>Education</h2>
                        <button type="button" onclick="addEducation()" class="btn btn-secondary">+ Add</button>
                    </div>
                    <div id="educationList">
                        {% for edu in cv.education or [] %}
                        <div class="entry-card education-entry">
                            <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>
                            <div class="form-group"><label>Degree</label><input type="text" class="edu-degree" value="{{ edu.degree }}"></div>
                            <div class="form-group"><label>Institution</label><input type="text" class="edu-inst" value="{{ edu.institution }}"></div>
                            <div class="form-group"><label>Year</label><input type="text" class="edu-year" value="{{ edu.year }}"></div>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <div class="section">
                    <h2>Skills</h2>
                    <div class="form-group">
                        <label>Skills (comma separated)</label>
                        <textarea id="skills" rows="3">{{ cv.skills|join(', ') if cv.skills else '' }}</textarea>
                    </div>
                </div>
            </form>
        </div>

        <div class="preview-panel">
            <div style="padding: 1rem; text-align: center; font-weight: 800; font-size: 0.8rem; color: #475569; letter-spacing: 2px;">LIVE PREVIEW</div>
            <iframe id="previewIframe"></iframe>
            <div style="padding: 1rem; display: flex; gap: 1rem;">
                <button onclick="saveCv()" class="btn btn-primary" style="flex: 1;">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        function addExperience() {
            const div = document.createElement('div');
            div.className = 'entry-card experience-entry';
            div.innerHTML = `
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>
                <div class="form-group"><label>Job Title</label><input type="text" class="exp-title"></div>
                <div class="form-group"><label>Company</label><input type="text" class="exp-company"></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group"><label>Start Date</label><input type="text" class="exp-start"></div>
                    <div class="form-group"><label>End Date</label><input type="text" class="exp-end"></div>
                </div>
                <div class="form-group"><label>Description</label><textarea class="exp-desc" rows="3"></textarea></div>
            `;
            document.getElementById('experienceList').appendChild(div);
        }

        function addEducation() {
            const div = document.createElement('div');
            div.className = 'entry-card education-entry';
            div.innerHTML = `
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>
                <div class="form-group"><label>Degree</label><input type="text" class="edu-degree"></div>
                <div class="form-group"><label>Institution</label><input type="text" class="edu-inst"></div>
                <div class="form-group"><label>Year</label><input type="text" class="edu-year"></div>
            `;
            document.getElementById('educationList').appendChild(div);
        }

        function collectData() {
            const data = {
                id: document.getElementById('cvId').value || null,
                title: document.getElementById('title').value,
                template: document.getElementById('template').value,
                full_name: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                summary: document.getElementById('summary').value,
                experience: [],
                education: [],
                skills: document.getElementById('skills').value.split(',').map(s => s.trim()).filter(s => s)
            };

            document.querySelectorAll('.experience-entry').forEach(el => {
                data.experience.push({
                    job_title: el.querySelector('.exp-title').value,
                    company: el.querySelector('.exp-company').value,
                    start_date: el.querySelector('.exp-start').value,
                    end_date: el.querySelector('.exp-end').value,
                    description: el.querySelector('.exp-desc').value
                });
            });

            document.querySelectorAll('.education-entry').forEach(el => {
                data.education.push({
                    degree: el.querySelector('.edu-degree').value,
                    institution: el.querySelector('.edu-inst').value,
                    year: el.querySelector('.edu-year').value
                });
            });

            return data;
        }

        async function saveCv() {
            const data = collectData();
            const response = await fetch('/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (result.status === 'success') {
                document.getElementById('cvId').value = result.cv_id;
                updatePreview();
                alert('Saved successfully!');
            }
        }

        function updatePreview() {
            const id = document.getElementById('cvId').value;
            if (id) {
                document.getElementById('previewIframe').src = `/preview/${id}`;
            }
        }

        // Auto-update preview on load if editing
        window.onload = updatePreview;
    </script>
</body>
</html>
