<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Editor | ResumePro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: var(--slate-900);">
    
    <div class="nav-shell" style="margin-top: 1rem;">
        <nav class="navbar" style="background: rgba(15, 23, 42, 0.8); border-color: rgba(255,255,255,0.1);">
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <a href="index.html" class="btn btn-ghost" style="padding: 0.5rem 1rem; color: white;">
                    <i data-lucide="arrow-left" style="width: 18px;"></i>
                    <span>Dashboard</span>
                </a>
                <div style="height: 24px; width: 1px; background: rgba(255,255,255,0.1);"></div>
                <h2 style="font-size: 1.25rem; color: white;">Editor<span style="color: var(--p-500)">.ai</span></h2>
            </div>
            
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div id="save-status" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; font-weight: 800; color: #94a3b8; letter-spacing: 0.1em; text-transform: uppercase;">
                    <div class="active-pulse" style="width: 8px; height: 8px;"></div>
                    Syncing...
                </div>
                <button onclick="saveCV()" id="save-btn" class="btn btn-primary">
                    <i data-lucide="check-circle" style="width: 18px;"></i>
                    <span>Save Project</span>
                </button>
            </div>
        </nav>
    </div>

    <main class="editor-workspace">
        <!-- Input Section -->
        <div class="editor-pane">
            <div class="pane-scroll" id="form-root">
                
                <div class="section-head">
                    <div style="width: 40px; height: 40px; background: var(--slate-100); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--p-500);">
                        <i data-lucide="sliders" style="width: 20px;"></i>
                    </div>
                    <h3 style="font-size: 1.25rem;">Core Configuration</h3>
                </div>

                <div class="field-group">
                    <label>Project Name</label>
                    <input type="text" id="cv-title" placeholder="e.g. Google Application 2024" oninput="debouncedPreview()">
                </div>

                <div class="field-group">
                    <label>Design Language</label>
                    <select id="cv-template" onchange="debouncedPreview()">
                        <option value="Classic">Classic Corporate</option>
                        <option value="Formal">Formal Executive</option>
                        <option value="Modern">Modern Minimalist</option>
                        <option value="Colorful">Vibrant Professional</option>
                        <option value="Executive">Executive Dark</option>
                        <option value="Creative">Creative Teal</option>
                    </select>
                </div>

                <!-- Personal Info -->
                <div class="section-head" style="margin-top: 3rem;">
                    <div style="width: 40px; height: 40px; background: var(--slate-100); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--p-500);">
                        <i data-lucide="user" style="width: 20px;"></i>
                    </div>
                    <h3 style="font-size: 1.25rem;">Identity</h3>
                </div>

                <div class="field-group">
                    <label>Full Name</label>
                    <input type="text" id="full_name" placeholder="Alex Rivera" oninput="debouncedPreview()">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                    <div class="field-group" style="margin-bottom: 0;">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="alex@work.com" oninput="debouncedPreview()">
                    </div>
                    <div class="field-group" style="margin-bottom: 0;">
                        <label>Phone</label>
                        <input type="text" id="phone" placeholder="+1 234 567 890" oninput="debouncedPreview()">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                    <div class="field-group" style="margin-bottom: 0;">
                        <label>Location</label>
                        <input type="text" id="address" placeholder="New York, NY" oninput="debouncedPreview()">
                    </div>
                    <div class="field-group" style="margin-bottom: 0;">
                        <label>LinkedIn / Portfolio</label>
                        <input type="text" id="linkedin" placeholder="linkedin.com/in/alex" oninput="debouncedPreview()">
                    </div>
                </div>

                <div class="field-group">
                    <label>Professional Bio</label>
                    <textarea id="summary" rows="5" placeholder="Highlight your biggest wins..." oninput="debouncedPreview()"></textarea>
                </div>

                <!-- Experience -->
                <div class="section-head" style="margin-top: 3rem; justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <div style="width: 40px; height: 40px; background: var(--slate-100); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--p-500);">
                            <i data-lucide="briefcase" style="width: 20px;"></i>
                        </div>
                        <h3 style="font-size: 1.25rem;">Career History</h3>
                    </div>
                    <button onclick="addExperience()" class="btn btn-ghost" style="padding: 0.5rem 1rem; font-size: 0.75rem;">
                        <i data-lucide="plus" style="width: 14px;"></i> ADD
                    </button>
                </div>
                <div id="experience-list"></div>

                <!-- Education -->
                <div class="section-head" style="margin-top: 3rem; justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <div style="width: 40px; height: 40px; background: var(--slate-100); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--p-500);">
                            <i data-lucide="graduation-cap" style="width: 20px;"></i>
                        </div>
                        <h3 style="font-size: 1.25rem;">Academic Path</h3>
                    </div>
                    <button onclick="addEducation()" class="btn btn-ghost" style="padding: 0.5rem 1rem; font-size: 0.75rem;">
                        <i data-lucide="plus" style="width: 14px;"></i> ADD
                    </button>
                </div>
                <div id="education-list"></div>

                <!-- Projects -->
                <div class="section-head" style="margin-top: 3rem; justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <div style="width: 40px; height: 40px; background: var(--slate-100); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--p-500);">
                            <i data-lucide="code" style="width: 20px;"></i>
                        </div>
                        <h3 style="font-size: 1.25rem;">Key Projects</h3>
                    </div>
                    <button onclick="addProject()" class="btn btn-ghost" style="padding: 0.5rem 1rem; font-size: 0.75rem;">
                        <i data-lucide="plus" style="width: 14px;"></i> ADD
                    </button>
                </div>
                <div id="projects-list"></div>

                <!-- Skills -->
                <div class="section-head" style="margin-top: 3rem;">
                    <div style="width: 40px; height: 40px; background: var(--slate-100); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--p-500);">
                        <i data-lucide="zap" style="width: 20px;"></i>
                    </div>
                    <h3 style="font-size: 1.25rem;">Core Arsenal</h3>
                </div>
                <div class="field-group">
                    <label>Skill Tags (Comma separated)</label>
                    <textarea id="skills" rows="3" placeholder="React, Python, Cloud Arch, Strategy..." oninput="debouncedPreview()"></textarea>
                </div>

            </div>
        </div>

        <!-- Preview Section -->
        <div class="preview-pane">
            <!-- Floating action toolbar always visible -->
            <div style="position: absolute; top: 1rem; right: 1rem; z-index: 10; display: flex; gap: 0.5rem; align-items: center;">
                <button onclick="updatePreview()" title="Refresh Preview" class="btn btn-ghost" style="padding: 0.5rem; border-radius: 50%; width: 38px; height: 38px; justify-content: center;">
                    <i data-lucide="refresh-cw" style="width: 16px;"></i>
                </button>
                <button onclick="downloadHTML()" title="Download as HTML" class="btn btn-ghost" style="padding: 0.5rem 1rem; gap: 0.4rem; background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); color: #10b981;">
                    <i data-lucide="code" style="width: 16px;"></i>
                    <span style="font-size: 0.75rem;">HTML</span>
                </button>
                <button onclick="printPreview()" title="Download as PDF" class="btn btn-ghost" style="padding: 0.5rem 1rem; gap: 0.4rem; background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.3); color: #6366f1;">
                    <i data-lucide="file-down" style="width: 16px;"></i>
                    <span style="font-size: 0.75rem;">PDF</span>
                </button>
                <button onclick="saveCV()" class="btn btn-primary" style="padding: 0.5rem 1rem; gap: 0.4rem;">
                    <i data-lucide="save" style="width: 16px;"></i>
                    <span style="font-size: 0.75rem;">Save</span>
                </button>
            </div>
            <iframe id="preview-frame" style="width: 100%; height: 100%; border: none; background: white;"></iframe>
        </div>
    </main>

    <script>
        let cvId = new URLSearchParams(window.location.search).get('id');
        let previewTimeout;

        function parseMonth(str) {
            if (!str || str === 'Present') return '';
            if (str.match(/^\d{4}-\d{2}$/)) return str;
            const d = new Date(str);
            if (!isNaN(d.getTime())) {
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}`;
            }
            return '';
        }

        function formatMonth(str) {
            if (!str) return '';
            if (str === 'Present') return 'Present';
            const parts = str.split('-');
            if (parts.length === 2) {
                const date = new Date(parts[0], parseInt(parts[1]) - 1);
                return date.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
            }
            return str;
        }

        function togglePresent(checkbox) {
            const endInput = checkbox.closest('.field-group').querySelector('.exp-end');
            endInput.disabled = checkbox.checked;
            debouncedPreview();
        }

        function debouncedPreview() {
            clearTimeout(previewTimeout);
            document.getElementById('save-status').innerHTML = '<div class="spinner-tiny"></div> SYNCING';
            previewTimeout = setTimeout(() => {
                updatePreview();
                document.getElementById('save-status').innerHTML = '<div class="active-pulse"></div> SYNCED';
            }, 1200);
        }

        async function init() {
            if (cvId) {
                const response = await fetch(`/api/cvs/${cvId}`);
                const data = await response.json();
                loadData(data);
            }
            updatePreview();
            lucide.createIcons();
        }

        function loadData(data) {
            document.getElementById('cv-title').value = data.title || '';
            document.getElementById('cv-template').value = data.template || 'Classic';
            document.getElementById('full_name').value = data.full_name || '';
            document.getElementById('email').value = data.email || '';
            document.getElementById('phone').value = data.phone || '';
            document.getElementById('address').value = data.address || '';
            document.getElementById('linkedin').value = data.linkedin || '';
            document.getElementById('summary').value = data.summary || '';
            document.getElementById('skills').value = (data.skills || []).join(', ');

            if (data.experience) data.experience.forEach(exp => addExperience(exp));
            if (data.education) data.education.forEach(edu => addEducation(edu));
            if (data.projects) data.projects.forEach(proj => addProject(proj));
        }

        function addExperience(data = {}) {
            const container = document.getElementById('experience-list');
            const div = document.createElement('div');
            div.className = 'exp-item-container';
            div.style.background = 'var(--slate-100)';
            div.style.padding = '1.5rem';
            div.style.borderRadius = 'var(--radius-sm)';
            div.style.position = 'relative';
            div.innerHTML = `
                <button onclick="this.parentElement.remove(); debouncedPreview()" style="position: absolute; top: 0.75rem; right: 0.75rem; border: none; background: none; color: var(--slate-400); cursor: pointer;">
                    <i data-lucide="x-circle" style="width: 20px;"></i>
                </button>
                <div class="field-group" style="margin-bottom: 1rem;">
                    <label>Role</label>
                    <input type="text" class="exp-title" value="${data.job_title || ''}" oninput="debouncedPreview()">
                </div>
                <div class="field-group" style="margin-bottom: 1rem;">
                    <label>Organization</label>
                    <input type="text" class="exp-company" value="${data.company || ''}" oninput="debouncedPreview()">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="field-group" style="margin-bottom: 0;">
                        <label style="font-size: 0.75rem;">Start Date</label>
                        <input type="month" class="exp-start" value="${parseMonth(data.start_date)}" oninput="debouncedPreview()">
                    </div>
                    <div class="field-group" style="margin-bottom: 0;">
                        <label style="font-size: 0.75rem; display: flex; justify-content: space-between; align-items: center;">
                            End Date
                            <label style="display: flex; align-items: center; gap: 4px; cursor: pointer; text-transform: none; color: var(--p-500);">
                                <input type="checkbox" onchange="togglePresent(this)" ${data.end_date === 'Present' ? 'checked' : ''}> Present
                            </label>
                        </label>
                        <input type="month" class="exp-end" value="${parseMonth(data.end_date)}" ${data.end_date === 'Present' ? 'disabled' : ''} oninput="debouncedPreview()">
                    </div>
                </div>
                <textarea class="exp-desc" rows="3" placeholder="Achievements..." style="margin-top: 1rem;" oninput="debouncedPreview()">${data.description || ''}</textarea>
            `;
            container.appendChild(div);
            lucide.createIcons();
        }

        function addEducation(data = {}) {
            const container = document.getElementById('education-list');
            const div = document.createElement('div');
            div.className = 'edu-item-container';
            div.style.background = 'var(--slate-100)';
            div.style.padding = '1.5rem';
            div.style.borderRadius = 'var(--radius-sm)';
            div.style.position = 'relative';
            div.innerHTML = `
                <button onclick="this.parentElement.remove(); debouncedPreview()" style="position: absolute; top: 0.75rem; right: 0.75rem; border: none; background: none; color: var(--slate-400); cursor: pointer;">
                    <i data-lucide="x-circle" style="width: 20px;"></i>
                </button>
                <div class="field-group" style="margin-bottom: 1rem;">
                    <label>Degree</label>
                    <input type="text" class="edu-degree" value="${data.degree || ''}" oninput="debouncedPreview()">
                </div>
                <div class="field-group" style="margin-bottom: 1rem;">
                    <label>Institute</label>
                    <input type="text" class="edu-institution" value="${data.institution || ''}" oninput="debouncedPreview()">
                </div>
                <input type="text" class="edu-year" placeholder="Graduation Year" value="${data.year || ''}" oninput="debouncedPreview()">
            `;
            container.appendChild(div);
            lucide.createIcons();
        }

        function addProject(data = {}) {
            const container = document.getElementById('projects-list');
            const div = document.createElement('div');
            div.className = 'proj-item-container';
            div.style.background = 'var(--slate-100)';
            div.style.padding = '1.5rem';
            div.style.borderRadius = 'var(--radius-sm)';
            div.style.position = 'relative';
            div.innerHTML = `
                <button onclick="this.parentElement.remove(); debouncedPreview()" style="position: absolute; top: 0.75rem; right: 0.75rem; border: none; background: none; color: var(--slate-400); cursor: pointer;">
                    <i data-lucide="x-circle" style="width: 20px;"></i>
                </button>
                <div class="field-group" style="margin-bottom: 1rem;">
                    <label>Project Name</label>
                    <input type="text" class="proj-name" value="${data.name || ''}" oninput="debouncedPreview()">
                </div>
                <div class="field-group" style="margin-bottom: 1rem;">
                    <label>Link / URL</label>
                    <input type="text" class="proj-link" value="${data.link || ''}" oninput="debouncedPreview()">
                </div>
                <textarea class="proj-desc" rows="3" placeholder="Description..." style="margin-top: 1rem;" oninput="debouncedPreview()">${data.description || ''}</textarea>
            `;
            container.appendChild(div);
            lucide.createIcons();
        }

        function collectData() {
            const experience = Array.from(document.querySelectorAll('#experience-list .exp-item-container')).map(item => ({
                job_title: item.querySelector('.exp-title').value,
                company: item.querySelector('.exp-company').value,
                start_date: formatMonth(item.querySelector('.exp-start').value),
                end_date: item.querySelector('.exp-end').disabled ? 'Present' : formatMonth(item.querySelector('.exp-end').value),
                description: item.querySelector('.exp-desc').value
            }));

            const education = Array.from(document.querySelectorAll('#education-list .edu-item-container')).map(item => ({
                degree: item.querySelector('.edu-degree').value,
                institution: item.querySelector('.edu-institution').value,
                year: item.querySelector('.edu-year').value
            }));

            const projects = Array.from(document.querySelectorAll('#projects-list .proj-item-container')).map(item => ({
                name: item.querySelector('.proj-name').value,
                link: item.querySelector('.proj-link').value,
                description: item.querySelector('.proj-desc').value
            }));

            return {
                id: cvId,
                title: document.getElementById('cv-title').value,
                template: document.getElementById('cv-template').value,
                full_name: document.getElementById('full_name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                linkedin: document.getElementById('linkedin').value,
                summary: document.getElementById('summary').value,
                skills: document.getElementById('skills').value.split(',').map(s => s.trim()).filter(s => s),
                experience,
                education,
                projects
            };
        }

        async function updatePreview() {
            const data = collectData();
            const response = await fetch('/api/cvs/preview-temp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const html = await response.text();
            const iframe = document.getElementById('preview-frame');
            iframe.contentWindow.document.open();
            iframe.contentWindow.document.write(html);
            iframe.contentWindow.document.close();
        }

        async function saveCV() {
            const btn = document.getElementById('save-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="spinner-tiny"></div> SAVING...';
            
            const data = collectData();
            const response = await fetch('/api/cvs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            if (result.cv_id && !cvId) {
                window.location.href = `editor.html?id=${result.cv_id}`;
            } else if (result.status === 'success') {
                btn.innerHTML = '<i data-lucide="check" style="width: 18px;"></i> SAVED';
                setTimeout(() => { btn.innerHTML = originalText; lucide.createIcons(); }, 2000);
                document.getElementById('save-status').innerHTML = '<div class="active-pulse"></div> SYNCED';
            } else {
                alert('Save failed. Check terminal logs.');
                btn.innerHTML = originalText;
                lucide.createIcons();
            }
        }

        function printPreview() {
            const iframe = document.getElementById('preview-frame');
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
        }

        function downloadHTML() {
            const iframe = document.getElementById('preview-frame');
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            const clone = doc.documentElement.cloneNode(true);
            // Remove the in-CV toolbar
            const toolbar = clone.querySelector('.toolbar');
            if (toolbar) toolbar.remove();
            const htmlStr = '<!DOCTYPE html>\n' + clone.outerHTML;
            const blob = new Blob([htmlStr], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const name = document.getElementById('full_name').value || 'resume';
            a.href = url;
            a.download = name.replace(/\s+/g, '_') + '_resume.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        init();
    </script>
    <style>
        .spinner-tiny { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</body>
</html>
