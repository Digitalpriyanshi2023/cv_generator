<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Pro - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Resume Pro</h1>
                <p style="color: var(--text-muted)">Craft your elite professional resume</p>
            </div>
            <a href="editor.html" class="btn btn-primary">
                <span>+ Create New</span>
            </a>
        </header>

        <div id="cv-list" class="cv-grid">
            <!-- CV Cards will be injected here -->
            <div class="loading">Loading your resumes...</div>
        </div>
    </div>

    <script>
        async function fetchCVs() {
            try {
                const response = await fetch('/api/cvs');
                const cvs = await response.json();
                const container = document.getElementById('cv-list');
                container.innerHTML = '';

                if (cvs.length === 0) {
                    container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem;">No resumes found. Click "Create New" to start.</div>';
                    return;
                }

                cvs.forEach(cv => {
                    const card = document.createElement('div');
                    card.className = 'cv-card';
                    card.innerHTML = `
                        <h3>${cv.title || 'Untitled'}</h3>
                        <p>👤 ${cv.full_name || 'No Name Set'}</p>
                        <div class="cv-actions">
                            <a href="editor.html?id=${cv.id}" class="btn btn-secondary">Edit</a>
                            <button onclick="deleteCV(${cv.id})" class="btn btn-danger">Delete</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching CVs:', error);
                document.getElementById('cv-list').innerHTML = 'Error loading resumes.';
            }
        }

        async function deleteCV(id) {
            if (!confirm('Are you sure you want to delete this resume?')) return;
            try {
                const response = await fetch(`/api/cvs/${id}`, { method: 'DELETE' });
                if (response.ok) fetchCVs();
            } catch (error) {
                console.error('Error deleting CV:', error);
            }
        }

        window.onload = fetchCVs;
    </script>
</body>
</html>
