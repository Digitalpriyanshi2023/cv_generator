<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Editor | ResumePro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="height: 100vh; display: flex; flex-direction: column; overflow: hidden;">
    <nav class="navbar">
        <div class="nav-content">
            <div class="flex-between" style="width: 100%;">
                <div style="display: flex; align-items: center; gap: 1.5rem;">
                    <a href="index.html" class="btn btn-secondary" style="padding: 0.5rem 1rem;">
                        <i data-lucide="arrow-left"></i>
                        <span>Dashboard</span>
                    </a>
                    <div style="height: 24px; width: 1px; background: var(--border);"></div>
                    <div class="logo" style="font-size: 1.2rem;">
                        <span>Editor<span style="color: var(--primary)">.pro</span></span>
                    </div>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div id="status-badge" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); background: var(--bg-app); padding: 0.5rem 1rem; border-radius: 20px;">
                        <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--success);"></div>
                        ALL SAVED
                    </div>
                    <button onclick="saveCV()" class="btn btn-primary">
                        <i data-lucide="save"></i>
                        <span>Save Changes</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="editor-grid" style="flex: 1; padding: 1.5rem; margin: 0; max-width: none;">
        <!-- Left: Form -->
        <aside class="editor-sidebar">
            <div class="sidebar-content" id="editor-form">
                <section class="section-card">
                    <div class="section-title">
                        <i data-lucide="settings" style="width: 20px;"></i>
                        <h3>Resume Settings</h3>
                    </div>
                    <div class="input-group">
                        <label>Resume Title (Internal Name)</label>
                        <input type="text" id="cv-title" placeholder="e.g. Senior Software Engineer 2024" oninput="debouncedPreview()">
                    </div>
                    <div class="input-group">
                        <label>Visual Template</label>
                        <select id="cv-template" onchange="debouncedPreview()">
                            <option value="Classic">Classic Corporate</option>
                            <option value="Formal">Formal Executive</option>
                            <option value="Modern">Modern Minimalist</option>
                            <option value="Colorful">Vibrant Professional</option>
                        </select>
                    </div>
                </section>

                <section class="section-card">
                    <div class="section-title">
                        <i data-lucide="user" style="width: 20px;"></i>
                        <h3>Personal Details</h3>
                    </div>
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" id="full_name" placeholder="John Doe" oninput="debouncedPreview()">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="input-group">
                            <label>Email</label>
                            <input type="email" id="email" placeholder="john@example.com" oninput="debouncedPreview()">
                        </div>
                        <div class="input-group">
                            <label>Phone</label>
                            <input type="text" id="phone" placeholder="+1 (555) 000-0000" oninput="debouncedPreview()">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Location / Address</label>
                        <input type="text" id="address" placeholder="New York, NY" oninput="debouncedPreview()">
                    </div>
                    <div class="input-group">
                        <label>LinkedIn URL</label>
                        <input type="text" id="linkedin" placeholder="linkedin.com/in/johndoe" oninput="debouncedPreview()">
                    </div>
                    <div class="input-group">
                        <label>Professional Summary</label>
                        <textarea id="summary" rows="4" placeholder="Briefly describe your expertise..." oninput="debouncedPreview()"></textarea>
                    </div>
                </section>

                <!-- Experience -->
                <section class="section-card">
                    <div class="flex-between" style="margin-bottom: 1.25rem;">
                        <div class="section-title" style="margin-bottom: 0;">
                            <i data-lucide="briefcase" style="width: 20px;"></i>
                            <h3>Experience</h3>
                        </div>
                        <button onclick="addExperience()" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">
                            <i data-lucide="plus" style="width: 14px;"></i> Add
                        </button>
                    </div>
                    <div id="experience-list"></div>
                </section>

                <!-- Education -->
                <section class="section-card">
                    <div class="flex-between" style="margin-bottom: 1.25rem;">
                        <div class="section-title" style="margin-bottom: 0;">
                            <i data-lucide="graduation-cap" style="width: 20px;"></i>
                            <h3>Education</h3>
                        </div>
                        <button onclick="addEducation()" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">
                            <i data-lucide="plus" style="width: 14px;"></i> Add
                        </button>
                    </div>
                    <div id="education-list"></div>
                </section>

                <!-- Skills -->
                <section class="section-card">
                    <div class="section-title">
                        <i data-lucide="award" style="width: 20px;"></i>
                        <h3>Skills</h3>
                    </div>
                    <div class="input-group">
                        <label>Key Skills (Comma separated)</label>
                        <textarea id="skills" rows="3" placeholder="React, Python, Project Management, UI Design..." oninput="debouncedPreview()"></textarea>
                    </div>
                </section>
            </div>
        </aside>

        <!-- Right: Preview -->
        <div class="preview-container">
            <div class="preview-header">
                <div style="display: flex; gap: 0.75rem;">
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: #ff5f56;"></div>
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: #ffbd2e;"></div>
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: #27c93f;"></div>
                </div>
                <div style="font-size: 0.75rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;">
                    Live Interactive Preview
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button onclick="updatePreview()" class="btn btn-secondary" style="padding: 0.4rem; border-radius: 6px;">
                        <i data-lucide="refresh-cw" style="width: 16px;"></i>
                    </button>
                </div>
            </div>
            <iframe id="preview-frame" title="CV Preview"></iframe>
        </div>
    </main>

    <script>
        let cvId = new URLSearchParams(window.location.search).get('id');
        let previewTimeout;

        function debouncedPreview() {
            clearTimeout(previewTimeout);
            document.getElementById('status-badge').innerHTML = '<div class="spinner-tiny"></div> SAVING...';
            previewTimeout = setTimeout(() => {
                updatePreview();
                document.getElementById('status-badge').innerHTML = '<div style="width: 8px; height: 8px; border-radius: 50%; background: var(--success);"></div> ALL SAVED';
            }, 1000);
        }

        async function init() {
            if (cvId) {
                const response = await fetch(`/api/cvs/${cvId}`);
                const data = await response.json();
                loadData(data);
            }
            updatePreview();
            lucide.createIcons();
        }

        function loadData(data) {
            document.getElementById('cv-title').value = data.title || '';
            document.getElementById('cv-template').value = data.template || 'Classic';
            document.getElementById('full_name').value = data.full_name || '';
            document.getElementById('email').value = data.email || '';
            document.getElementById('phone').value = data.phone || '';
            document.getElementById('address').value = data.address || '';
            document.getElementById('linkedin').value = data.linkedin || '';
            document.getElementById('summary').value = data.summary || '';
            document.getElementById('skills').value = (data.skills || []).join(', ');

            if (data.experience) {
                data.experience.forEach(exp => addExperience(exp));
            }
            if (data.education) {
                data.education.forEach(edu => addEducation(edu));
            }
        }

        function addExperience(data = {}) {
            const container = document.getElementById('experience-list');
            const div = document.createElement('div');
            div.className = 'dynamic-item';
            div.innerHTML = `
                <button class="btn" style="position: absolute; top: 0.5rem; right: 0.5rem; color: var(--danger); padding: 0.25rem;" onclick="this.parentElement.remove(); debouncedPreview()">
                    <i data-lucide="x" style="width: 16px;"></i>
                </button>
                <div class="input-group">
                    <label>Job Title</label>
                    <input type="text" class="exp-title" value="${data.job_title || ''}" oninput="debouncedPreview()">
                </div>
                <div class="input-group">
                    <label>Company</label>
                    <input type="text" class="exp-company" value="${data.company || ''}" oninput="debouncedPreview()">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="input-group">
                        <label>Start</label>
                        <input type="text" class="exp-start" value="${data.start_date || ''}" oninput="debouncedPreview()">
                    </div>
                    <div class="input-group">
                        <label>End</label>
                        <input type="text" class="exp-end" value="${data.end_date || ''}" oninput="debouncedPreview()">
                    </div>
                </div>
                <div class="input-group" style="margin-bottom: 0;">
                    <label>Description</label>
                    <textarea class="exp-desc" rows="3" oninput="debouncedPreview()">${data.description || ''}</textarea>
                </div>
            `;
            container.appendChild(div);
            lucide.createIcons();
        }

        function addEducation(data = {}) {
            const container = document.getElementById('education-list');
            const div = document.createElement('div');
            div.className = 'dynamic-item';
            div.innerHTML = `
                <button class="btn" style="position: absolute; top: 0.5rem; right: 0.5rem; color: var(--danger); padding: 0.25rem;" onclick="this.parentElement.remove(); debouncedPreview()">
                    <i data-lucide="x" style="width: 16px;"></i>
                </button>
                <div class="input-group">
                    <label>Degree</label>
                    <input type="text" class="edu-degree" value="${data.degree || ''}" oninput="debouncedPreview()">
                </div>
                <div class="input-group">
                    <label>Institution</label>
                    <input type="text" class="edu-institution" value="${data.institution || ''}" oninput="debouncedPreview()">
                </div>
                <div class="input-group" style="margin-bottom: 0;">
                    <label>Year</label>
                    <input type="text" class="edu-year" value="${data.year || ''}" oninput="debouncedPreview()">
                </div>
            `;
            container.appendChild(div);
            lucide.createIcons();
        }

        function collectData() {
            const experience = Array.from(document.querySelectorAll('#experience-list .dynamic-item')).map(item => ({
                job_title: item.querySelector('.exp-title').value,
                company: item.querySelector('.exp-company').value,
                start_date: item.querySelector('.exp-start').value,
                end_date: item.querySelector('.exp-end').value,
                description: item.querySelector('.exp-desc').value
            }));

            const education = Array.from(document.querySelectorAll('#education-list .dynamic-item')).map(item => ({
                degree: item.querySelector('.edu-degree').value,
                institution: item.querySelector('.edu-institution').value,
                year: item.querySelector('.edu-year').value
            }));

            return {
                id: cvId,
                title: document.getElementById('cv-title').value,
                template: document.getElementById('cv-template').value,
                full_name: document.getElementById('full_name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                linkedin: document.getElementById('linkedin').value,
                summary: document.getElementById('summary').value,
                skills: document.getElementById('skills').value.split(',').map(s => s.trim()).filter(s => s),
                experience,
                education
            };
        }

        async function updatePreview() {
            const data = collectData();
            const response = await fetch('/api/cvs/preview-temp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const html = await response.text();
            const iframe = document.getElementById('preview-frame');
            iframe.contentWindow.document.open();
            iframe.contentWindow.document.write(html);
            iframe.contentWindow.document.close();
        }

        async function saveCV() {
            const data = collectData();
            const response = await fetch('/api/cvs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (result.cv_id && !cvId) {
                window.location.href = `editor.html?id=${result.cv_id}`;
            } else if (result.status === 'success') {
                alert('Project saved to secure vault.');
            }
        }

        init();
    </script>
    <style>
        .spinner-tiny {
            width: 12px;
            height: 12px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</body>
</html>
